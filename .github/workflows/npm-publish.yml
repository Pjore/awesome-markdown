name: NPM Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm --filter @awesome-markdown/contracts build
      - run: pnpm publish --filter @awesome-markdown/contracts --access public --no-git-checks
      - run: pnpm --filter @awesome-markdown/filter-engine build
      - run: pnpm publish --filter @awesome-markdown/filter-engine --access public --no-git-checks
      - run: pnpm --filter @awesome-markdown/provider-http build
      - run: pnpm publish --filter @awesome-markdown/provider-http --access public --no-git-checks
      - run: pnpm --filter @awesome-markdown/provider-localstorage build
      - run: pnpm publish --filter @awesome-markdown/provider-localstorage --access public --no-git-checks
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
