services:

  # ── kanban-ui ─────────────────────────────────────────────────────────────
  # React SPA served by nginx. VITE_* variables are baked into the bundle at
  # build time — see apps/kanban-ui/Dockerfile for details.
  kanban-ui:
    image: ghcr.io/pjore/awesome-markdown-kanban-ui:latest
    platform: linux/amd64
    ports:
      - "5173:80"
    env_file:
      - path: apps/kanban-ui/.env
        required: false
    depends_on:
      provider-fs:
        condition: service_started

  # ── provider-fs ───────────────────────────────────────────────────────────
  # Fastify sidecar that reads/writes the content/ directory.
  # PROVIDER_FS_HOST must be 0.0.0.0 in apps/provider-fs/.env so the server
  # accepts connections from outside its container.
  # PROVIDER_FS_CONTENT_ROOT must be /content (the container-internal path).
  provider-fs:
    image: ghcr.io/pjore/awesome-markdown-provider-fs:latest
    platform: linux/amd64
    ports:
      - "7701:7701"
    env_file:
      - path: apps/provider-fs/.env
        required: false
    environment:
      PROVIDER_FS_HOST: "0.0.0.0"
      PROVIDER_FS_CONTENT_ROOT: "/content"
    volumes:
      - ./content:/content

  # ── sync-engine ───────────────────────────────────────────────────────────
  # File-watcher, auto-commit, and SSE broadcast service.
  # Requires one bind mount:
  #   . → /repo  (full repo root so simple-git can read/write .git/;
  #               content/ is accessible at /repo/content — same host
  #               directory that provider-fs mounts at /content)
  # SYNC_ENGINE_HOST must be 0.0.0.0 in apps/sync-engine/.env.
  # SYNC_ENGINE_REPO_ROOT must be /repo in apps/sync-engine/.env.
  sync-engine:
    image: ghcr.io/pjore/awesome-markdown-sync-engine:latest
    platform: linux/amd64
    ports:
      - "7402:7402"
    env_file:
      - path: apps/sync-engine/.env
        required: false
    environment:
      SYNC_ENGINE_HOST: "0.0.0.0"
      SYNC_ENGINE_REPO_ROOT: "/repo"
    volumes:
      - .:/repo
    depends_on:
      provider-fs:
        condition: service_started
